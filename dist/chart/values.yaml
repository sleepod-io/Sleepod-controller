defaultNamespace: sleepod-controller-system

## String to partially override chart.fullname template (will maintain the release name)
##
# nameOverride: ""

## String to fully override chart.fullname template
##
# fullnameOverride: ""

## Configure the controller manager deployment
##
manager:
  replicas: 1

  image:
    repository: sleepod-controller
    tag: latest
    pullPolicy: IfNotPresent

  ## Arguments
  ##
  args:
    - --leader-elect

  ## Environment variables
  ##
  env:
    - name: SLEEPOD_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace

  ## Env overrides (--set manager.envOverrides.VAR=value)
  ## Same name in env above: this value takes precedence.
  ##
  envOverrides: {}

  ## Image pull secrets
  ##
  imagePullSecrets: []

  ## Pod-level security settings
  ##
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  ## Container-level security settings
  ##
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  ## Resource limits and requests
  ##
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

  ## Manager pod's affinity
  ##
  affinity: {}

  ## Manager pod's node selector
  ##
  nodeSelector: {}

  ## Manager pod's tolerations
  ##
  tolerations: []

## Helper RBAC roles for managing custom resources
##
rbacHelpers:
  # Install convenience admin/editor/viewer roles for CRDs
  enable: false

## Custom Resource Definitions
##
crd:
  # Install CRDs with the chart
  enable: true
  # Keep CRDs when uninstalling
  keep: true

## Controller metrics endpoint.
## Enable to expose /metrics endpoint with RBAC protection.
##
metrics:
  enable: true
  # Metrics server port
  port: 8443

## Cert-manager integration for TLS certificates.
## Required for webhook certificates and metrics endpoint certificates.
##
certManager:
  enable: false

## Prometheus ServiceMonitor for metrics scraping.
## Requires prometheus-operator to be installed in the cluster.
##
prometheus:
  enable: false


# [CONFIG]: Application Configuration
config:
  defaultWakeAt: "08:00"
  defaultSleepAt: "20:00"
  defaultTimezone: "UTC"
  logLevel: info
  excludeWeekend: false
  weekend: "friday,saturday" # will work only if excludeWeekend is true
  defaultPolicyEnabled: false
  namespaceConfig:
    delaySeconds: 20
    ttlEnabled: false
    expirationTTLInDays: 30 # in days, will work only if ttlEnabled is true
    excludedNamespaces:
      # Also possible to exclude by annotation: sleepod.io/exclude: "true" on the Namespace
      - kube-system
      - kube-public
      - kube-node-lease
      - local-path-storage

# [CLEANUP]: Cleanup Job Configurations
cleanup:
  image:
    repository: registry.k8s.io/kubectl
    tag: v1.32.1
    pullPolicy: IfNotPresent
