{{- if .Values.rbacHelpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "sleepod-controller.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ include "sleepod-controller.resourceName" (dict "suffix" "sleeporder-admin-role" "context" $) }}
rules:
- apiGroups:
  - sleepod.sleepod.io
  resources:
  - sleeporders
  verbs:
  - '*'
- apiGroups:
  - sleepod.sleepod.io
  resources:
  - sleeporders/status
  verbs:
  - get
{{- end }}
