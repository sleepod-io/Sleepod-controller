apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "sleepod-controller.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    control-plane: controller-manager
  name: {{ include "sleepod-controller.resourceName" (dict "suffix" "controller-manager" "context" $) }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.manager.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sleepod-controller.name" . }}
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: {{ include "sleepod-controller.name" . }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        control-plane: controller-manager
    spec:
      {{- with .Values.manager.tolerations }}
      tolerations: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with .Values.manager.affinity }}
      affinity: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with .Values.manager.nodeSelector }}
      nodeSelector: {{ toYaml . | nindent 10 }}
      {{- end }}
      containers:
      - args:
        {{- if .Values.metrics.enable }}
        - --metrics-bind-address=:{{ .Values.metrics.port }}
        {{- else }}
        # Bind to :0 to disable the controller-runtime managed metrics server
        - --metrics-bind-address=0
        {{- end }}
        - --health-probe-bind-address=:8081
        - --zap-log-level={{ .Values.config.logLevel }}
        {{- range .Values.manager.args }}
        - {{ . }}
        {{- end }}
        command:
        - /manager
        env:
          - name: SLEEPOD_DEFAULT_WAKE_AT
            value: {{ .Values.config.defaultWakeAt | quote }}
          - name: SLEEPOD_DEFAULT_SLEEP_AT
            value: {{ .Values.config.defaultSleepAt | quote }}
          - name: SLEEPOD_DEFAULT_TIMEZONE
            value: {{ .Values.config.defaultTimezone | quote }}
          - name: SLEEPOD_NAMESPACE_DELAY_SECONDS
            value: {{ .Values.config.namespaceConfig.delaySeconds | quote }}
          - name: SLEEPOD_EXCLUDED_NAMESPACES
            value: {{ join "," .Values.config.namespaceConfig.excludedNamespaces | quote }}
          - name: SLEEPOD_DEFAULT_POLICY_ENABLED
            value: {{ .Values.config.defaultPolicyEnabled | quote }}
          - name: SLEEPOD_WEEKEND
            value: {{ .Values.config.weekend | quote }}
          - name: SLEEPOD_EXCLUDE_WEEKEND
            value: {{ .Values.config.excludeWeekend | quote }}
          - name: SLEEPOD_NAMESPACE_TTL_ENABLED
            value: {{ .Values.config.namespaceConfig.ttlEnabled | quote }}
          - name: SLEEPOD_NAMESPACE_EXPIRATION_TTL_IN_DAYS
            value: {{ .Values.config.namespaceConfig.expirationTTLInDays | quote }}
{{- if or .Values.manager.env (and (kindIs "map" .Values.manager.envOverrides) (not (empty .Values.manager.envOverrides))) }}
          {{- if .Values.manager.env }}
          {{- toYaml .Values.manager.env | nindent 10 }}
          {{- end }}
          {{- if kindIs "map" .Values.manager.envOverrides }}
          {{- range $k, $v := .Values.manager.envOverrides }}
          - name: {{ $k }}
            value: {{ $v | quote }}
          {{ end }}
          {{- end }}
{{- end }}
        image: "{{ .Values.manager.image.repository }}:{{ .Values.manager.image.tag }}"
        imagePullPolicy: {{ .Values.manager.image.pullPolicy }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports: []
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- if .Values.manager.resources }}
          {{- toYaml .Values.manager.resources | nindent 10 }}
          {{- else }}
          {}
          {{- end }}
        securityContext:
          {{- if .Values.manager.securityContext }}
          {{- toYaml .Values.manager.securityContext | nindent 10 }}
          {{- else }}
          {}
          {{- end }}
        volumeMounts: []
      securityContext:
        {{- if .Values.manager.podSecurityContext }}
        {{- toYaml .Values.manager.podSecurityContext | nindent 8 }}
        {{- else }}
        {}
        {{- end }}
      serviceAccountName: {{ include "sleepod-controller.resourceName" (dict "suffix" "controller-manager" "context" $) }}
      terminationGracePeriodSeconds: 10
      volumes: []
